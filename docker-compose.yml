# =============================================================================
# Networks
# =============================================================================
networks:
  strapi-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mysql-data:
    driver: local
  strapi-uploads:
    driver: local

# =============================================================================
# Shared Strapi environment block
# =============================================================================
x-strapi-env: &strapi-env
  env_file: .env
  environment:
    # --- Node Environment ---
    NODE_ENV: ${NODE_ENV}
    # --- Strapi Server ---
    HOST: ${STRAPI_HOST}
    PORT: ${STRAPI_PORT}
    # --- Database ---
    DATABASE_CLIENT: ${DATABASE_CLIENT}
    DATABASE_HOST: mysql
    DATABASE_PORT: ${DATABASE_PORT}
    DATABASE_NAME: ${DATABASE_NAME}
    DATABASE_USERNAME: ${DATABASE_USERNAME}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    # --- Database Pool ---
    DATABASE_POOL_MIN: ${DATABASE_POOL_MIN}
    DATABASE_POOL_MAX: ${DATABASE_POOL_MAX}
    # --- Database Misc ---
    DATABASE_CONNECTION_TIMEOUT: ${DATABASE_CONNECTION_TIMEOUT}
    # --- Strapi Secrets ---
    APP_KEYS: ${APP_KEYS}
    API_TOKEN_SALT: ${API_TOKEN_SALT}
    ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
    JWT_SECRET: ${JWT_SECRET}

# =============================================================================
# Shared Frontend environment block
# =============================================================================
x-front-env: &front-env
  env_file: .env
  environment:
    # --- Node Environment ---
    NODE_ENV: ${NODE_ENV}
    # --- Frontend Server ---
    HOST: ${FRONTEND_HOST}
    PORT: ${FRONTEND_PORT}
    # --- Strapi connection (server-side, container-to-container) ---
    STRAPI_INTERNAL_URL: ${STRAPI_INTERNAL_URL}
    # --- Public vars (exposed to the browser) ---
    NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL}
    NEXT_PUBLIC_STRAPI_API_TOKEN: ${NEXT_PUBLIC_STRAPI_API_TOKEN}
    # --- App config ---
    NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # MySQL Database Service
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:latest
    container_name: strapi_mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - strapi-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DATABASE_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Strapi CMS - Development
  # ---------------------------------------------------------------------------
  strapi-dev:
    build:
      context: ./cms-api
      dockerfile: Dockerfile
      target: development                   # Target the dev stage
    container_name: strapi_dev
    restart: unless-stopped
    <<: *strapi-env
    ports:
      - "1337:1337"
    volumes:
      - ./cms-api:/opt/app            # Mount source for hot-reload
      - /opt/app/node_modules         # Prevent host node_modules override
      - strapi-uploads:/opt/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy    # Wait for DB to be ready
    networks:
      - strapi-network
    profiles:
      - dev                           # Only starts with --profile dev

  # ---------------------------------------------------------------------------
  # Strapi CMS - Production
  # ---------------------------------------------------------------------------
  strapi-prod:
    build:
      context: ./cms-api
      dockerfile: Dockerfile
      target: production                    # Target the prod stage
    container_name: strapi_prod
    restart: unless-stopped
    <<: *strapi-env
    ports:
      - "1337:1337"
    volumes:
      - strapi-uploads:/opt/app/public/uploads   # Persist uploads only
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - strapi-network
    profiles:
      - prod                          # Only starts with --profile prod

# ---------------------------------------------------------------------------
  # Frontend - Development
  # ---------------------------------------------------------------------------
  front-dev:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: development                   # Target the dev stage
    container_name: front_dev
    restart: unless-stopped
    <<: *front-env
    ports:
      - "3000:3000"
    volumes:
      - ./front:/opt/app              # Mount source for hot-reload
      - /opt/app/node_modules         # Prevent host node_modules override
      - /opt/app/.next                # Keep build cache inside container
    depends_on:
      - strapi-dev
    networks:
      - strapi-network
    profiles:
      - dev                           # Only starts with --profile dev

  # ---------------------------------------------------------------------------
  # Frontend - Production
  # ---------------------------------------------------------------------------
  front-prod:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: production                    # Target the prod stage
      args:
        # NEXT_PUBLIC_* are inlined at BUILD time, so they must be passed here too
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL}
        NEXT_PUBLIC_STRAPI_API_TOKEN: ${NEXT_PUBLIC_STRAPI_API_TOKEN}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: front_prod
    restart: unless-stopped
    <<: *front-env
    ports:
      - "3000:3000"
    depends_on:
      - strapi-prod
    networks:
      - strapi-network
    profiles:
      - prod                          # Only starts with --profile prod